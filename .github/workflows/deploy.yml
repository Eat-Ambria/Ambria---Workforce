name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # npm install (not `npm ci`): the lockfile is generated on Windows and
      # omits Linux-only optional binaries (esbuild, @emnapi/*), which makes the
      # strict `npm ci` fail on the Linux runner. `npm install` resolves them.
      - run: npm install --no-audit --no-fund
      - run: npm run build
        env:
          # Set these in: GitHub repo -> Settings -> Secrets and variables -> Actions
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      # SPA fallback: GitHub Pages serves 404.html for unknown paths. Making it a
      # copy of index.html lets deep links (e.g. /fix-request) load the app so
      # React Router can handle the route instead of showing a 404.
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
